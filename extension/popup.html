<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      width: 280px;
      padding: 16px;
      margin: 0;
    }
    h2 { font-size: 15px; color: #d4a574; margin: 0 0 8px; }
    p { font-size: 12px; color: #8b949e; line-height: 1.5; margin: 0 0 12px; }
    button {
      width: 100%;
      padding: 8px;
      background: #8b6d4a;
      color: #0d1117;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #d4a574; }
    .hint { font-size: 10px; color: #484f58; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Source Lens</h2>
  <p>Browse the web through the lens of your primary source. Open the side panel to search or scan any page.</p>
  <button id="open">Open Side Panel</button>
  <div class="hint">Powered by ruvector semantic search</div>
  <script>
    document.getElementById('open').addEventListener('click', async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      chrome.sidePanel.open({ tabId: tab.id });
      window.close();
    });
  </script>
</body>
</html>
